<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nexora Admin — Reviews</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Nexora — Reviews (Admin)</h1>
        <div class="hint">Dark admin for approving reviews</div>
      </div>
      <div class="controls-top">
        <input id="search" placeholder="Search by name or text" />
        <button id="refresh">Refresh</button>
      </div>
    </header>
    <main>
      <div id="pending"></div>
    </main>
  </div>

  <div id="previewModal" class="modal">
    <div class="modal-body">
      <h3>Preview review</h3>
      <div id="previewContent"></div>
      <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
        <button id="modalCancel" class="btn reject">Cancel</button>
        <button id="modalConfirm" class="btn approve">Confirm</button>
      </div>
    </div>
  </div>

  <audio id="notifySound"></audio>
  <script src="/main.js"></script>
</body>
</html>
