services:
  - type: web
    name: nexora-cabinet-api
    runtime: node
    rootDir: telegram-admin
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        value: Nexora_loginbot
      - key: ADMIN_ID
        value: "6057196483"
      - key: FIREBASE_DATABASE_URL
        value: https://nexorakabinetr-default-rtdb.europe-west1.firebasedatabase.app
      - key: SESSION_SECRET
        generateValue: true
      - key: SITE_URL
        value: https://nexoraads.online
